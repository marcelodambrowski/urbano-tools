<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urbano Tools — Automatize seu trabalho no AutoCAD</title>
<meta name="description" content="Mais de 20 ferramentas AutoLISP para topógrafos e engenheiros: memorial descritivo automático, tabelas, divisão de área, locação de obras e muito mais. Direto no AutoCAD.">
<meta property="og:title" content="Urbano Tools — Automatize seu trabalho no AutoCAD">
<meta property="og:description" content="Mais de 20 ferramentas AutoLISP para topógrafos e engenheiros. Memorial descritivo, tabelas, divisão de área e locação — tudo direto no AutoCAD por R$15/mês.">
<meta property="og:type" content="website">
<meta property="og:image" content="https://marcelodambrowski.github.io/urbano-tools/og-image.png">
<meta property="og:url" content="https://marcelodambrowski.github.io/urbano-tools/">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    scroll-behavior: smooth; /* Ativa a rolagem suave na página */
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #F2F4F7;
    color: #1A1A2E;
    line-height: 1.6;
  }

  .page {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 80px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* HERO */
  .hero {
    background: #1B2A3B;
    padding: 48px 32px 40px;
    border-radius: 16px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: #E8A020;
  }

/* Garante que o contêiner pai exiba os grupos lado a lado */
.ribbon-main-items {
  display: flex;
  flex-direction: row; /* Força o alinhamento horizontal */
  align-items: stretch;
  gap: 8px;
}

/* Opcional: Ajuste para os grupos terem comportamento flexível */
.r-group {
  display: flex;
  flex-direction: column;
  align-items: center; /* Centraliza os botões dentro do grupo */
}
  
  /* Banner WPP incorporado no topo do Hero */
  .hero-top-badge {
    background: rgba(37, 211, 102, 0.12);
    border: 1px solid rgba(37, 211, 102, 0.25);
    color: #25D366;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 8px;
    margin-bottom: 24px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .hero-top-badge strong { font-weight: 600; }

  .hero-logo {
    font-size: 34px;
    font-weight: 600;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 24px;
  }
  .hero-logo span { color: #6EB5E0; display: block; font-weight: 400; }
  .hero-headline {
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 12px;
    line-height: 1.4;
  }
  .hero-sub {
    font-size: 15px;
    color: #9BB8CC;
    line-height: 1.7;
    margin-bottom: 28px;
    max-width: 480px;
  }
  .hero-buttons { display: flex; flex-wrap: wrap; align-items: center; gap: 16px; }

  .btn-wpp {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #25D366;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    padding: 14px 24px;
    border-radius: 100px;
    text-decoration: none;
    transition: opacity .2s;
  }
  .btn-wpp:hover { opacity: .9; }
  .btn-wpp i { font-size: 20px; }

  .btn-assinar {
    color: #9BB8CC;
    font-size: 14px;
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    padding: 0;
    transition: color .2s;
  }
  .btn-assinar:hover { color: #fff; }

  /* DOR */
  .dor {
    background: #FFF8F0;
    border: 1px solid #F5C890;
    border-radius: 16px;
    padding: 28px;
  }
  .dor-title {
    font-size: 15px;
    font-weight: 600;
    color: #7A4A0A;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dor-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 10px;
    font-size: 14px;
    color: #8B5E1A;
    line-height: 1.5;
  }
  .dor-item:last-child { margin-bottom: 0; }
  .dor-item i { color: #C0601A; font-size: 17px; margin-top: 2px; flex-shrink: 0; }

  /* SECTION */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #8A96A8;
    margin-bottom: 4px;
    padding: 0 4px;
  }
  .section-title {
    font-size: 20px;
    font-weight: 600;
    color: #1A1A2E;
    margin-bottom: 6px;
    line-height: 1.3;
    padding: 0 4px;
  }
  .section-sub {
    font-size: 14px;
    color: #5A6577;
    margin-bottom: 14px;
    line-height: 1.6;
    padding: 0 4px;
  }

  /* MEMORIAL DESTAQUE */
  .memorial-highlight {
    background: #1B2A3B;
    border-radius: 16px;
    padding: 28px;
  }
  .mh-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #E8A020;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 12px;
  }
  .mh-title {
    font-size: 17px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .mh-desc {
    font-size: 14px;
    color: #9BB8CC;
    line-height: 1.7;
    margin-bottom: 16px;
  }
  .mh-checks { display: flex; flex-direction: column; gap: 10px; }
  .mh-check {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #C8DAEB;
  }
  .mh-check i { color: #6EB5E0; font-size: 16px; flex-shrink: 0; }

  /* FEATURE CARDS */
  .features { display: flex; flex-direction: column; gap: 12px; }
  .feat-card {
    background: #fff;
    border: 1px solid #E2E8F0;
    border-radius: 16px;
    padding: 20px 22px;
    display: flex;
    gap: 18px;
    align-items: flex-start;
  }
  .feat-icon {
    width: 46px;
    height: 46px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 22px;
  }
  .feat-icon.blue   { background: #E6F1FB; color: #185FA5; }
  .feat-icon.teal   { background: #E1F5EE; color: #0F6E56; }
  .feat-icon.amber  { background: #FAEEDA; color: #854F0B; }
  .feat-icon.purple { background: #EEEDFE; color: #534AB7; }
  .feat-icon.coral  { background: #FAECE7; color: #993C1D; }
  .feat-body { flex: 1; }
  .feat-title { font-size: 15px; font-weight: 600; color: #1A1A2E; margin-bottom: 5px; }
  .feat-desc { font-size: 13px; color: #5A6577; line-height: 1.6; }
  .feat-tag {
    display: inline-block;
    background: #E1F5EE;
    color: #0A5C43;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 100px;
    margin-top: 8px;
  }
  .feat-tag.amber { background: #FAEEDA; color: #6B3E08; }

  /* PARA QUEM */
  .audience-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .aud-card {
    background: #fff;
    border: 1px solid #E2E8F0;
    border-radius: 12px;
    padding: 18px 14px;
    text-align: center;
  }
  .aud-card i { font-size: 26px; color: #185FA5; margin-bottom: 10px; display: block; }
  .aud-card strong { color: #1A1A2E; font-weight: 600; display: block; margin-bottom: 5px; font-size: 14px; }
  .aud-card p { font-size: 12px; color: #5A6577; line-height: 1.5; }

  /* PRICING */
  .pricing-card {
    background: #fff;
    border: 2px solid #185FA5;
    border-radius: 16px;
    padding: 28px;
  }
  .pricing-badge {
    display: inline-block;
    background: #185FA5;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 14px;
    border-radius: 100px;
    margin-bottom: 14px;
  }
  .pricing-name { font-size: 22px; font-weight: 700; color: #1A1A2E; margin-bottom: 4px; }
  .pricing-sub { font-size: 13px; color: #5A6577; margin-bottom: 4px; }
  .pricing-price {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin: 14px 0 22px;
  }
  .pricing-price .currency { font-size: 16px; color: #5A6577; }
  .pricing-price .amount { font-size: 48px; font-weight: 700; color: #185FA5; line-height: 1; }
  .pricing-price .period { font-size: 14px; color: #5A6577; }
  .pricing-includes { margin-bottom: 22px; border-top: 1px solid #E2E8F0; padding-top: 16px; }
  .pi-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #3A4557;
    padding: 7px 0;
    border-bottom: 1px solid #F0F4F8;
  }
  .pi-item:last-child { border-bottom: none; }
  .pi-item i { color: #0F6E56; font-size: 17px; flex-shrink: 0; }

  .pricing-cta-wpp {
    width: 100%;
    background: #25D366;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    padding: 16px;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
    transition: opacity .2s;
  }
  .pricing-cta-wpp:hover { opacity: .9; }
  .pricing-cta-wpp i { font-size: 22px; }

  .pricing-cta-assinar {
    width: 100%;
    background: transparent;
    color: #185FA5;
    font-size: 14px;
    font-weight: 500;
    padding: 13px;
    border-radius: 100px;
    border: 1px solid #185FA5;
    cursor: pointer;
    text-align: center;
    display: block;
    margin-top: 10px;
    text-decoration: none;
    transition: background .2s, color .2s;
  }
  .pricing-cta-assinar:hover { background: #185FA5; color: #fff; }

  .pricing-guarantee {
    font-size: 12px;
    color: #8A96A8;
    text-align: center;
    margin-top: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  /* FOOTER */
  .footer {
    background: #1B2A3B;
    padding: 24px 28px;
    border-radius: 16px;
    text-align: center;
  }
  .footer p { font-size: 12px; color: #6B8499; }
  .footer strong { color: #9BB8CC; }
  .footer p + p { margin-top: 6px; }

  /* RIBBON SECTION */
  .ribbon-section {
    background: #fff;
    border: 1px solid #E2E8F0;
    border-radius: 16px;
    padding: 0 0 20px;
    overflow: hidden;
  }
  .ribbon-mockup {
    background: #1E3A50;
    padding: 10px 14px 0;
    margin-bottom: 20px;
  }
  .ribbon-tabs {
    display: flex;
    gap: 2px;
  }
  .r-tab {
    background: #16303F;
    color: #9BB8CC;
    font-size: 10px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 4px 4px 0 0;
    letter-spacing: .04em;
    opacity: .6;
  }
  .r-tab.active {
    background: #2C5070;
    color: #E8A020;
    opacity: 1;
  }
  .ribbon-bar {
    background: #2C5070;
    padding: 8px 10px 10px;
    display: flex;
    align-items: flex-start;
    gap: 6px;
    border-bottom: 2px solid #E8A020;
  }
  .r-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 7px 9px 5px;
    flex: 1; /* distribui igualmente */
    cursor: pointer;
    min-width: 0;
  }
  .r-btn i { font-size: 18px; color: #6EB5E0; }
  .r-btn span { font-size: 8.5px; color: #C8DAEB; text-align: center; line-height: 1.2; font-weight: 500; white-space: nowrap; }
  .r-btn.highlight { background: rgba(232,160,32,0.15); border-color: rgba(232,160,32,0.4); }
  .r-btn.highlight i { color: #E8A020; }
  /* "Sobre" empurrado para a direita */
  .r-btn.r-end { margin-left: auto; flex: 0 0 auto; }
  /* Botões extras: ocultos por padrão no mobile, visíveis em telas maiores */
  .r-extra { display: none; }
  @media (min-width: 480px) {
    .r-extra { display: flex; }
  }

  .ribbon-callout {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: #F0F6FB;
    border-left: 3px solid #185FA5;
    border-radius: 0 8px 8px 0;
    padding: 14px 16px;
    margin: 0 20px;
  }
  .ribbon-callout i { color: #185FA5; font-size: 20px; margin-top: 2px; flex-shrink: 0; }
  .ribbon-callout p { font-size: 13px; color: #2A3E52; line-height: 1.6; margin: 0; }
  .ribbon-callout p strong { color: #185FA5; }
  .ribbon-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; justify-content: center; padding: 0 20px; }
  .ribbon-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #E6F1FB;
    color: #185FA5;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 100px;
  }
  .ribbon-chip i { font-size: 14px; }

  /* FAQ */
  .faq-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .faq-item {
    background: #fff;
    border: 1px solid #E2E8F0;
    border-radius: 12px;
    padding: 16px 20px;
  }
  .faq-q {
    font-size: 14px;
    font-weight: 600;
    color: #1A1A2E;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .faq-q i { color: #185FA5; font-size: 17px; flex-shrink: 0; }
  .faq-a {
    font-size: 13px;
    color: #5A6577;
    line-height: 1.65;
    padding-left: 25px;
  }

  /* CONTATO / SUGESTÕES */
  .contact-section {
    background: #1B2A3B;
    border-radius: 16px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .contact-block {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .contact-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 22px;
  }
  .contact-icon.amber  { background: rgba(232,160,32,0.18); color: #E8A020; }
  .contact-icon.teal   { background: rgba(37,211,102,0.15); color: #25D366; }
  .contact-body {}
  .contact-title { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 6px; }
  .contact-desc { font-size: 13px; color: #9BB8CC; line-height: 1.6; }
  .contact-divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 0; }
  .contact-cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #25D366;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 13px 22px;
    border-radius: 100px;
    text-decoration: none;
    transition: opacity .2s;
    align-self: flex-start;
  }
  .contact-cta:hover { opacity: .9; }

  /* YOUTUBE */
  .yt-block {
    background: #1B2A3B;
    border-radius: 16px;
    padding: 28px;
    position: relative;
    overflow: hidden;
  }
  .yt-block::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: #FF0000;
  }
  .yt-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .yt-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: rgba(255,0,0,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 24px;
    color: #FF4444;
  }
  .yt-title {
    font-size: 17px;
    font-weight: 600;
    color: #fff;
  }
  .yt-sub {
    font-size: 13px;
    color: #9BB8CC;
    margin-top: 2px;
  }
  .yt-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,0,0,0.18);
    border: 1px solid rgba(255,68,68,0.3);
    color: #FF6666;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 16px;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .yt-desc {
    font-size: 14px;
    color: #9BB8CC;
    line-height: 1.7;
    margin-bottom: 20px;
  }
  .yt-items {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 22px;
  }
  .yt-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #C8DAEB;
  }
  .yt-item i { color: #FF6666; font-size: 16px; flex-shrink: 0; }
  .yt-cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #FF0000;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 13px 22px;
    border-radius: 100px;
    text-decoration: none;
    transition: opacity .2s;
  }
  .yt-cta:hover { opacity: .85; }
  .yt-cta i { font-size: 18px; }
  .yt-note {
    font-size: 12px;
    color: #6B8499;
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .yt-note i { font-size: 14px; }

  /* NAV FIXO */
  .topnav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(27, 42, 59, 0.96);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 52px;
  }
  .topnav-brand {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .topnav-brand span { color: #6EB5E0; font-weight: 400; }
  .topnav-links {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .topnav-links a {
    font-size: 13px;
    color: #9BB8CC;
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 8px;
    transition: background .2s, color .2s;
    white-space: nowrap;
  }
  .topnav-links a:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .topnav-cta {
    background: #25D366 !important;
    color: #fff !important;
    font-weight: 600 !important;
    padding: 7px 14px !important;
    border-radius: 100px !important;
  }
  .topnav-cta:hover { opacity: .9; background: #25D366 !important; }

  /* FEATURE CARDS — 2 colunas em telas maiores */
  @media (min-width: 620px) {
    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
  }

  /* DEPOIMENTOS */
  .testimonials { display: flex; flex-direction: column; gap: 12px; }
  @media (min-width: 620px) {
    .testimonials { flex-direction: row; }
    .testimonials .testi-card { flex: 1; }
  }
  .testi-card {
    background: #fff;
    border: 1px solid #E2E8F0;
    border-radius: 16px;
    padding: 22px;
    position: relative;
  }
  .testi-placeholder {
    border: 2px dashed #C8D8E8;
    background: #F7FAFD;
  }
  .testi-stars { color: #E8A020; font-size: 14px; margin-bottom: 12px; letter-spacing: 2px; }
  .testi-text { font-size: 14px; color: #3A4557; line-height: 1.65; margin-bottom: 14px; font-style: italic; }
  .testi-author { display: flex; align-items: center; gap: 10px; }
  .testi-avatar {
    width: 38px; height: 38px;
    border-radius: 100px;
    background: #E6F1FB;
    display: flex; align-items: center; justify-content: center;
    color: #185FA5; font-size: 18px; flex-shrink: 0;
  }
